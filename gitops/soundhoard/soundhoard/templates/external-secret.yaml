apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: soundhoard
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: soundhoard
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: soundhoard-telegram-token
