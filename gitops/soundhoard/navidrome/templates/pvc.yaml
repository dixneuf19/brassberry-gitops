---
# Shared music PVC — used by both Navidrome and SoundHoard
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soundhoard-music
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Mi
  storageClassName: nfs-client
---
# Navidrome internal data (database, cache)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-data
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Mi
  storageClassName: nfs-client
