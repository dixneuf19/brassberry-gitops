apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: navidrome-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: navidrome-secrets
  data:
    - secretKey: ND_PASSWORDENCRYPTIONKEY
      remoteRef:
        key: navidrome-password-encryption-key
