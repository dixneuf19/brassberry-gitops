apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: yoshi-basic-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: yoshi-basic-auth
    template:
      engineVersion: v2
      data:
        auth: '{{ "{{ .username }}:{{ .password | bcrypt }}" }}'
  data:
    - secretKey: username
      remoteRef:
        key: yoshi-basic-auth-username
    - secretKey: password
      remoteRef:
        key: yoshi-basic-auth-password
