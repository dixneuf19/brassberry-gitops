apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: whats-on-fip
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: whats-on-fip
  data:
    - secretKey: BOT_TELEGRAM_TOKEN
      remoteRef:
        key: fip-telegram-bot-token
    - secretKey: RADIO_FRANCE_API_TOKEN
      remoteRef:
        key: radio-france-api-token
