apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fip-telegram-bot
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: fip-telegram-bot
  data:
    - secretKey: BOT_TELEGRAM_TOKEN
      remoteRef:
        key: fip-telegram-bot-token
