apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: files-auth
  namespace: netflix
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: files-auth
    template:
      engineVersion: v2
      data:
        auth: "{{ .username }}:{{ .password | bcrypt }}"
  data:
    - secretKey: username
      remoteRef:
        key: files-auth-username
    - secretKey: password
      remoteRef:
        key: files-auth-password
