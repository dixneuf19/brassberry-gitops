apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: telegram-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: telegram-token
  data:
    - secretKey: TELEGRAM_TOKEN
      remoteRef:
        key: dank-face-telegram-token
