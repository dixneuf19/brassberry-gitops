# Defaults merged into each application entry (override per-app as needed)
defaults:
  repoURL: https://github.com/dixneuf19/brassberry-gitops
  targetRevision: main
  type: helm
  selfHeal: true
  createNamespace: true
  prune: true
  finalizer: true

applications:
  # =============================================================================
  # Default namespace
  # =============================================================================
  - name: http-echo
    namespace: default
    path: gitops/default/http-echo

  - name: whoami
    namespace: default
    path: gitops/default/whoami/
    type: directory

  - name: cd-lna
    namespace: default
    path: gitops/default/cd-lna/manifests
    type: directory

  - name: personal-website
    namespace: default
    path: manifests
    type: directory
    selfHeal: true
    repoURL: https://github.com/dixneuf19/personal-website

  # =============================================================================
  # FIP apps
  # =============================================================================
  - name: whats-on-fip
    namespace: fip
    path: gitops/fip/whats-on-fip

  - name: fip-slack-bot
    namespace: fip
    path: gitops/fip/fip-slack-bot

  - name: fip-telegram-bot
    namespace: fip
    path: gitops/fip/fip-telegram-bot

  - name: spotify-api
    namespace: fip
    path: gitops/fip/spotify-api

  # =============================================================================
  # Dank Face Bot apps
  # =============================================================================
  - name: dank-face-bot
    namespace: dank-face-bot
    path: gitops/dank-face-bot/dank-face-bot

  - name: dank-face-slack-bot
    namespace: dank-face-bot
    path: gitops/dank-face-bot/dank-face-slack-bot
    selfHeal: true

  - name: fuzzy-octo-disco
    namespace: dank-face-bot
    path: gitops/dank-face-bot/fuzzy-octo-disco

  # =============================================================================
  # ArgoCD
  # =============================================================================
  - name: argocd-apps
    namespace: argocd
    path: gitops/argocd/apps/
    prune: false
    finalizer: false

  - name: argo-cd
    namespace: argocd
    path: gitops/argocd/argo-cd/
    syncOptions:
      - ServerSideApply=true

  - name: argocd-image-updater
    namespace: argocd
    path: gitops/argocd/argocd-image-updater/

  # =============================================================================
  # Monitoring
  # =============================================================================
  - name: kps
    namespace: monitoring
    path: gitops/monitoring/kps
    createNamespace: false
    helm:
      skipCrds: true
    syncOptions:
      - ServerSideApply=true

  - name: karma
    namespace: monitoring
    path: gitops/monitoring/karma

  - name: kube-state-metrics
    namespace: monitoring
    path: gitops/monitoring/kube-state-metrics/

  # =============================================================================
  # Storage
  # =============================================================================
  - name: nfs-client-provisioner
    namespace: storage
    path: gitops/storage/nfs-client-provisioner

  - name: local-path-provisioner
    namespace: storage
    path: gitops/storage/local-path-provisioner/
    type: directory

  # =============================================================================
  # Infrastructure
  # =============================================================================
  - name: ingress-nginx
    namespace: ingress-nginx
    path: gitops/ingress-nginx/ingress-nginx/

  - name: cert-manager
    namespace: cert-manager
    path: gitops/cert-manager/cert-manager/
    type: directory

  - name: metallb
    namespace: default
    path: gitops/metallb-system/metallb/
    type: directory
    createNamespace: false

  - name: external-secrets
    namespace: external-secrets
    path: gitops/external-secrets/external-secrets/
    type: directory
    syncOptions:
      - ServerSideApply=true

  - name: bitwarden-secret-store
    namespace: external-secrets
    path: gitops/external-secrets/bitwarden-secret-store/
    type: directory
    directory:
      include: "*.yaml"

  # =============================================================================
  # CNPG (CloudNative PostgreSQL)
  # =============================================================================
  - name: cloudnative-pg
    namespace: cnpg-system
    path: gitops/cnpg-system/cloudnative-pg/
    type: directory
    syncOptions:
      - ServerSideApply=true

  - name: cnpg-image-catalogs
    namespace: cnpg-system
    path: image-catalogs/
    type: directory
    selfHeal: true
    repoURL: https://github.com/cloudnative-pg/artifacts

  # =============================================================================
  # Media servers
  # =============================================================================
  - name: lyrion-music-server
    namespace: lms
    path: gitops/lms/lyrion-music-server/
    ignoreDifferences:
      - group: apps
        kind: Deployment
        jqPathExpressions:
          - ".spec.template.spec.hostUsers"

  - name: radioyoshi
    namespace: lms-yoshi
    path: gitops/lms-yoshi/radioyoshi/
    ignoreDifferences:
      - group: apps
        kind: Deployment
        jqPathExpressions:
          - ".spec.template.spec.hostUsers"

  # =============================================================================
  # Other apps
  # =============================================================================
  - name: vpa
    namespace: vpa
    path: gitops/vpa/vpa/
    type: directory

  - name: karakeep
    namespace: karakeep
    path: gitops/karakeep/karakeep
    selfHeal: true

  - name: spliit
    namespace: spliit
    path: gitops/spliit/spliit
    selfHeal: true

  - name: readeck
    namespace: readeck
    path: gitops/readeck/readeck
    type: directory

  - name: librespeed
    namespace: tools
    path: gitops/tools/librespeed/manifests
    type: directory
    selfHeal: true
