# Bootstrap Application - apply manually: kubectl apply -f argocd-apps.yaml
# Edit values.yaml to add/remove/configure applications
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-apps
  annotations:
    argocd.argoproj.io/manifest-generate-paths: "."
spec:
  destination:
    namespace: argocd
    name: in-cluster
  project: default
  source:
    path: gitops/argocd/apps/
    repoURL: https://github.com/dixneuf19/brassberry-gitops
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
