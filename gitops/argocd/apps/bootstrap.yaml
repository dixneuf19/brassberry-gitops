# Static bootstrap Application for argocd-diff-preview.
# The tool needs a plain kind: Application YAML to discover as an entrypoint.
# With --traverse-app-of-apps, it renders this chart and finds all child apps.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-apps
spec:
  project: default
  source:
    repoURL: https://github.com/dixneuf19/brassberry-gitops
    targetRevision: main
    path: gitops/argocd/apps/
    helm:
      valueFiles:
        - values.yaml
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
